<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descarga NCF</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />
</head>
<body>
  <main class="pagina">

    <section class="tarjeta encabezado">
      <div>
        <div class="empresa">
          <img src="IMG/logo_cotizacion.png" alt="Logo empresa" class="logo-empresa" />
        </div>
        <p class="subtitulo">
          Descarga pública del archivo NCF generado mediante enlace temporal.
        </p>
      </div>
      <div class="estado-box" id="estadoDocumento">Validando</div>
    </section>

    <section class="tarjeta buscador">
      <label for="entradaBusqueda">Token de descarga</label>
      <div class="fila-busqueda">
        <input
          id="entradaBusqueda"
          type="text"
          placeholder="Token del enlace"
          autocomplete="off"
        />
        <button id="btnBuscar" type="button">Buscar</button>
      </div>

      <p class="ayuda">
        También puedes acceder directamente usando:
        <code>?token=XXXXXXX</code>
      </p>

      <div class="mensaje" id="mensaje">Validando enlace...</div>
    </section>

    <section class="tarjeta resumen">
      <div class="grid-resumen">
        <div class="campo campo-ancho">
          <span class="etiqueta">Archivo</span>
          <strong id="txtArchivo">-</strong>
        </div>

        <div class="campo">
          <span class="etiqueta">Registros</span>
          <strong id="txtRegistros">-</strong>
        </div>

        <div class="campo">
          <span class="etiqueta">Generado</span>
          <strong id="txtGenerado">-</strong>
        </div>

        <div class="campo">
          <span class="etiqueta">Disponible hasta</span>
          <strong id="txtExpira">-</strong>
        </div>
      </div>

      <div class="acciones">
        <button id="btnDescargar" type="button" disabled>
          Descargar Excel
        </button>
        <button id="btnCopiarLink" type="button" class="btn-secundario">
          Copiar enlace
        </button>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
